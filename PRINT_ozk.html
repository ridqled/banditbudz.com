<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bandit Budz — OZK — A4 Print Sheet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@page{size:A4;margin:8mm}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#fff}
.screen{background:#111;color:#7fff00;padding:14px 20px;font-family:'Arial Black',Arial,sans-serif;font-size:18px;letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
.screen small{color:#888;font-size:11px;font-weight:normal;font-family:Arial}
.btn{display:block;margin:14px auto;padding:12px 40px;background:#7fff00;color:#111;font-size:15px;font-weight:900;border:none;border-radius:8px;cursor:pointer;letter-spacing:1px}
@media print{.screen,.btn{display:none!important}}
.a4{width:210mm;min-height:297mm;page-break-after:always;padding:6mm;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:6mm}
.sticker{border:1.5px solid #000;border-radius:3mm;padding:3mm 2mm;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;aspect-ratio:1}
.s-top{font-size:6.5pt;font-weight:900;letter-spacing:.5px;text-transform:uppercase;text-align:center;color:#000;margin-bottom:2.5mm}
.qr-wrap{border:2px solid #000;padding:1.5mm;background:#fff;line-height:0}
.s-num{font-size:13pt;font-weight:900;color:#000;margin-top:2.5mm;letter-spacing:2px}
.s-dates{font-size:5pt;color:#666;margin-top:1.5mm;text-align:center;line-height:1.6}
.s-brand{font-size:5.5pt;font-weight:900;letter-spacing:2px;color:#000;margin-top:1.5mm;text-transform:uppercase}
</style>
</head>
<body>
<div class="screen">🌿 BANDIT BUDZ — OZK PRINT SHEET <small>30 QR labels · 5 A4 pages · Cut &amp; stick</small></div>
<button class="btn" onclick="window.print()">🖨️ PRINT 5 PAGES (30 QR CODES)</button>
<div id="pages"></div>
<script>
const urls=["https://banditbudz.com/products/ozk-01.html","https://banditbudz.com/products/ozk-02.html","https://banditbudz.com/products/ozk-03.html","https://banditbudz.com/products/ozk-04.html","https://banditbudz.com/products/ozk-05.html","https://banditbudz.com/products/ozk-06.html","https://banditbudz.com/products/ozk-07.html","https://banditbudz.com/products/ozk-08.html","https://banditbudz.com/products/ozk-09.html","https://banditbudz.com/products/ozk-10.html","https://banditbudz.com/products/ozk-11.html","https://banditbudz.com/products/ozk-12.html","https://banditbudz.com/products/ozk-13.html","https://banditbudz.com/products/ozk-14.html","https://banditbudz.com/products/ozk-15.html","https://banditbudz.com/products/ozk-16.html","https://banditbudz.com/products/ozk-17.html","https://banditbudz.com/products/ozk-18.html","https://banditbudz.com/products/ozk-19.html","https://banditbudz.com/products/ozk-20.html","https://banditbudz.com/products/ozk-21.html","https://banditbudz.com/products/ozk-22.html","https://banditbudz.com/products/ozk-23.html","https://banditbudz.com/products/ozk-24.html","https://banditbudz.com/products/ozk-25.html","https://banditbudz.com/products/ozk-26.html","https://banditbudz.com/products/ozk-27.html","https://banditbudz.com/products/ozk-28.html","https://banditbudz.com/products/ozk-29.html","https://banditbudz.com/products/ozk-30.html"];
const pagesDiv=document.getElementById('pages');
for(let p=0;p<5;p++){
  const pg=document.createElement('div');
  pg.className='a4';
  for(let s=0;s<6;s++){
    const i=p*6+s;
    const num=String(i+1).padStart(2,'0');
    const el=document.createElement('div');
    el.className='sticker';
    el.innerHTML=`<div class="s-top">OZK</div><div class="qr-wrap" id="q${i}"></div><div class="s-num">#${num}</div><div class="s-dates">Cultivated: 06 Jan 2026<br>Packaged: 13 Mar 2026</div><div class="s-brand">BANDIT BUDZ</div>`;
    pg.appendChild(el);
  }
  pagesDiv.appendChild(pg);
}
window.addEventListener('load',()=>{
  urls.forEach((url,i)=>{
    new QRCode(document.getElementById('q'+i),{text:url,width:130,height:130,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});
  });
});
</script>
</body>
</html>
